<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arcade Hall 2026</title>
    <style>
        :root { --neon: #00ff88; --bg: #0a0a0c; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; }
        
        /* MENU */
        #menu { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 90%; max-width: 500px; }
        .card { background: #1a1a1a; border: 2px solid #333; padding: 20px; border-radius: 15px; cursor: pointer; text-align: center; font-weight: bold; }
        .card:hover { border-color: var(--neon); box-shadow: 0 0 10px var(--neon); }

        /* HRA */
        #game-screen { display: none; position: fixed; inset: 0; background: #000; flex-direction: column; align-items: center; }
        .header { width: 100%; padding: 10px; background: #111; display: flex; justify-content: space-around; align-items: center; border-bottom: 2px solid #333; }
        canvas { border: 2px solid #444; background: #050505; margin-top: 10px; box-shadow: 0 0 20px rgba(0,255,136,0.1); }
        
        /* NÁVOD */
        .instructions { margin-top: 15px; padding: 10px; background: #1a1a1a; border-radius: 8px; width: 90%; max-width: 300px; font-size: 0.9rem; border-left: 4px solid var(--neon); }
        
        /* GAME OVER */
        #game-over { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.85); flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        .btn { background: var(--neon); color: #000; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div id="menu">
    <h1>🕹️ ARCADE</h1>
    <div class="grid">
        <div class="card" onclick="start('tetris')">🔲 Tetris</div>
        <div class="card" onclick="start('pong')">🏓 Ping Pong</div>
    </div>
</div>

<div id="game-screen">
    <div class="header">
        <span id="title">HRA</span>
        <b id="score-text">Skóre: 0</b>
        <button onclick="location.reload()" style="background:#444; color:white; border:none; padding:5px 10px;">Zpět</button>
    </div>
    
    <canvas id="c"></canvas>

    <div class="instructions">
        <b>Ovládání:</b>
        <p id="inst-text">Na PC: Šipky. Na mobilu: Klepání/Tažení.</p>
    </div>

    <div id="game-over">
        <h2 style="color:red">KONEC HRY</h2>
        <p id="final-score">Skóre: 0</p>
        <button class="btn" onclick="restart()">Zkusit znovu</button>
    </div>
</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
let mode = "", score = 0, active = false, frame = 0;

// Tetris proměnné
let grid = [], piece = null;
const SHAPES = [[],[0,1,0,0, 0,1,0,0, 0,1,0,0, 0,1,0,0],[0,2,0, 0,2,0, 0,2,2],[4,4,4,4],[0,5,0, 5,5,5, 0,0,0]];
const COLORS = [null, '#00d2ff', '#ff007f', '#39ff14', '#bc13fe'];

// Pong proměnné
let ball = {x:150, y:200, sx:3, sy:3}, pX = 110;

function start(m) {
    mode = m; score = 0; active = true; frame = 0;
    document.getElementById("menu").style.display = "none";
    document.getElementById("game-screen").style.display = "flex";
    document.getElementById("game-over").style.display = "none";
    document.getElementById("title").innerText = m.toUpperCase();

    if(mode === 'tetris') {
        canvas.width = 240; canvas.height = 400; // 12x20 políček (20px každé)
        document.getElementById("inst-text").innerText = "Šipky vlevo/vpravo = pohyb, Nahoru = otočit, Dolů = zrychlit.";
        grid = Array.from({length: 20}, () => Array(12).fill(0));
        newPiece();
    } else {
        canvas.width = 300; canvas.height = 450;
        document.getElementById("inst-text").innerText = "Pohybuj myší nebo prstem do stran pro odrážení míčku.";
        ball = {x:150, y:150, sx:3, sy:3}; pX = 110;
    }
    loop();
}

function newPiece() {
    const id = Math.floor(Math.random() * (COLORS.length - 1)) + 1;
    piece = { pos: {x: 4, y: 0}, matrix: [[0,id,0],[id,id,id],[0,0,0]], color: COLORS[id] };
    if (collide()) gameOver();
}

function collide() {
    for (let y = 0; y < piece.matrix.length; y++) {
        for (let x = 0; x < piece.matrix[y].length; x++) {
            if (piece.matrix[y][x] !== 0) {
                let ny = y + piece.pos.y;
                let nx = x + piece.pos.x;
                if (ny >= 20 || nx < 0 || nx >= 12 || grid[ny][nx]) return true;
            }
        }
    }
    return false;
}

function loop() {
    if(!active) return;
    ctx.fillStyle = "#000"; ctx.fillRect(0,0,canvas.width,canvas.height);
    
    if(mode === 'tetris') {
        if(frame++ % 30 === 0) { piece.pos.y++; if(collide()) { piece.pos.y--; merge(); newPiece(); } }
        // Vykreslení ohraničené plochy
        ctx.strokeStyle = "#333";
        for(let i=0; i<12; i++) for(let j=0; j<20; j++) ctx.strokeRect(i*20, j*20, 20, 20);
        
        grid.forEach((row, y) => row.forEach((v, x) => { if(v) { ctx.fillStyle = COLORS[v]; ctx.fillRect(x*20, y*20, 19, 19); } }));
        piece.matrix.forEach((row, y) => row.forEach((v, x) => { if(v) { ctx.fillStyle = piece.color; ctx.fillRect((x+piece.pos.x)*20, (y+piece.pos.y)*20, 19, 19); } }));
    } else {
        ball.x += ball.sx; ball.y += ball.sy;
        if(ball.x<5 || ball.x>295) ball.sx *= -1;
        if(ball.y<5) ball.sy *= -1;
        if(ball.y > 420 && ball.x > pX && ball.x < pX + 80) { ball.sy = -Math.abs(ball.sy); score++; ball.sx *= 1.05; ball.sy *= 1.05; }
        if(ball.y > 450) gameOver();
        ctx.fillStyle = var(--neon);
        ctx.fillRect(pX, 430, 80, 10);
        ctx.beginPath(); ctx.arc(ball.x, ball.y, 8, 0, 7); ctx.fill();
    }
    
    document.getElementById("score-text").innerText = "Skóre: " + score;
    requestAnimationFrame(loop);
}

function merge() {
    piece.matrix.forEach((row, y) => row.forEach((v, x) => {
        if(v) { grid[y + piece.pos.y][x + piece.pos.x] = v; }
    }));
    // Mazání řad
    outer: for(let y=19; y>=0; y--) {
        for(let x=0; x<12; x++) if(!grid[y][x]) continue outer;
        grid.splice(y, 1); grid.unshift(Array(12).fill(0));
        score += 100; y++;
    }
}

function gameOver() {
    active = false;
    document.getElementById("game-over").style.display = "flex";
    document.getElementById("final-score").innerText = "Skóre: " + score;
}

function restart() { start(mode); }

// OVLÁDÁNÍ
window.onkeydown = (e) => {
    if(mode === 'tetris') {
        if(e.key === 'ArrowLeft') { piece.pos.x--; if(collide()) piece.pos.x++; }
        if(e.key === 'ArrowRight') { piece.pos.x++; if(collide()) piece.pos.x--; }
        if(e.key === 'ArrowDown') { piece.pos.y++; if(collide()) piece.pos.y--; }
        if(e.key === 'ArrowUp') {
            const m = piece.matrix;
            piece.matrix = m[0].map((_, i) => m.map(row => row[i]).reverse());
            if(collide()) piece.matrix = m;
        }
    }
};

canvas.onpointermove = (e) => {
    if(mode === 'pong') {
        let rect = canvas.getBoundingClientRect();
        pX = (e.clientX - rect.left) * (canvas.width / rect.width) - 40;
    }
};
</script>
</body>
</html>
