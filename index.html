<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Moje HTML5 Hra</title>
    <style>
        body { margin: 0; background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: sans-serif; }
        canvas { border: 4px solid #fff; background: #000; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .info { position: absolute; top: 20px; text-align: center; }
    </style>
</head>
<body>

    <div class="info">
        <h1>Mini Pong</h1>
        <p>Ovládej pálku pohybem myši</p>
    </div>

    <canvas id="gameCanvas" width="800" height="400"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Nastavení míčku
        let ballX = canvas.width / 2;
        let ballY = canvas.height / 2;
        let ballSpeedX = 5;
        let ballSpeedY = 5;
        const ballRadius = 10;

        // Nastavení pálky hráče
        const paddleHeight = 100;
        const paddleWidth = 10;
        let paddleY = (canvas.height - paddleHeight) / 2;

        // Sledování pohybu myši
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const root = document.documentElement;
            const mouseY = e.clientY - rect.top - root.scrollTop;
            paddleY = mouseY - (paddleHeight / 2);
        });

        function update() {
            // Pohyb míčku
            ballX += ballSpeedX;
            ballY += ballSpeedY;

            // Odraz od horní a dolní stěny
            if (ballY < 0 || ballY > canvas.height) {
                ballSpeedY = -ballSpeedY;
            }

            // Odraz od pálky (levá strana)
            if (ballX < paddleWidth) {
                if (ballY > paddleY && ballY < paddleY + paddleHeight) {
                    ballSpeedX = -ballSpeedX;
                    // Mírné zrychlení pro obtížnost
                    ballSpeedX *= 1.05;
                    ballSpeedY *= 1.05;
                } else {
                    // Reset hry, pokud hráč mine
                    resetBall();
                }
            }

            // Odraz od pravé stěny (místo protihráče)
            if (ballX > canvas.width) {
                ballSpeedX = -ballSpeedX;
            }
        }

        function resetBall() {
            ballX = canvas.width / 2;
            ballY = canvas.height / 2;
            ballSpeedX = 5;
            ballSpeedY = 5;
        }

        function draw() {
            // Vymazání plochy
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Vykreslení pálky
            ctx.fillStyle = "white";
            ctx.fillRect(0, paddleY, paddleWidth, paddleHeight);

            // Vykreslení míčku
            ctx.beginPath();
            ctx.arc(ballX, ballY, ballRadius, 0, Math.PI * 2);
            ctx.fill();
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
