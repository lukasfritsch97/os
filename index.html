<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Pong se skóre</title>
    <style>
        body { margin: 0; background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { border: 5px solid #444; background: #000; box-shadow: 0 0 30px rgba(0,0,0,0.7); }
        .ui { position: absolute; top: 10px; text-align: center; pointer-events: none; }
    </style>
</head>
<body>

    <div class="ui">
        <p>Pohybuj myší pro odrážení</p>
    </div>

    <canvas id="gameCanvas" width="800" height="450"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Herní proměnné
        let score = 0;
        let highScore = 0;

        // Nastavení míčku
        let ballX = canvas.width / 2;
        let ballY = canvas.height / 2;
        let ballSpeedX = 5;
        let ballSpeedY = 5;
        const ballRadius = 10;

        // Nastavení pálky
        const paddleHeight = 100;
        const paddleWidth = 12;
        let paddleY = (canvas.height - paddleHeight) / 2;

        // Ovládání myší
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            paddleY = e.clientY - rect.top - (paddleHeight / 2);
        });

        function update() {
            ballX += ballSpeedX;
            ballY += ballSpeedY;

            // Odraz od stěn (nahoře/dole)
            if (ballY < 0 || ballY > canvas.height) {
                ballSpeedY = -ballSpeedY;
            }

            // Odraz od pravé stěny
            if (ballX > canvas.width) {
                ballSpeedX = -ballSpeedX;
            }

            // Kolize s pálkou (vlevo)
            if (ballX < paddleWidth) {
                if (ballY > paddleY && ballY < paddleY + paddleHeight) {
                    ballSpeedX = -ballSpeedX;
                    
                    // --- PŘIDÁNÍ SKÓRE ---
                    score++;
                    
                    // Zrychlení po každém zásahu (aby to bylo těžší)
                    ballSpeedX *= 1.05;
                    ballSpeedY *= 1.05;
                } else {
                    gameOver();
                }
            }
        }

        function gameOver() {
            if (score > highScore) highScore = score;
            score = 0;
            resetBall();
        }

        function resetBall() {
            ballX = canvas.width / 2;
            ballY = canvas.height / 2;
            ballSpeedX = 5;
            ballSpeedY = 5;
        }

        function draw() {
            // Pozadí
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Pálka
            ctx.fillStyle = "#00ff88"; // Zelená pálka
            ctx.fillRect(0, paddleY, paddleWidth, paddleHeight);

            // Míček
            ctx.fillStyle = "white";
            ctx.beginPath();
            ctx.arc(ballX, ballY, ballRadius, 0, Math.PI * 2);
            ctx.fill();

            // --- VYKRESLENÍ SKÓRE ---
            ctx.font = "30px Arial";
            ctx.fillStyle = "rgba(255, 255, 255, 0.5)";
            ctx.fillText("Skóre: " + score, canvas.width / 2 - 50, 50);
            ctx.font = "15px Arial";
            ctx.fillText("Nejlepší: " + highScore, canvas.width / 2 - 35, 80);
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
