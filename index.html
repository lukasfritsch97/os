<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moje Mini Hry</title>
    <style>
        :root { --p-color: #00ff88; --bg-dark: #121212; }
        body { margin: 0; font-family: sans-serif; background: var(--bg-dark); color: white; overflow-x: hidden; }
        
        /* Menu */
        .container { padding: 20px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; max-width: 800px; margin: 20px auto; }
        .game-card { background: #222; padding: 20px; border-radius: 10px; cursor: pointer; border: 2px solid transparent; transition: 0.3s; }
        .game-card:hover { border-color: var(--p-color); transform: translateY(-5px); }
        
        /* Herní okno */
        #game-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; flex-direction: column; }
        canvas { background: #000; touch-action: none; width: 100%; height: auto; max-height: 70vh; }
        .controls { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .btn { background: var(--p-color); color: black; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        
        @media (max-width: 600px) {
            h1 { font-size: 1.5rem; }
            .grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<div class="container" id="main-menu">
    <h1>🎮 Herní Portál</h1>
    <div class="grid">
        <div class="game-card" onclick="startGame('pong')">🏓 Pong</div>
        <div class="game-card" onclick="startGame('clicker')">🖱️ Clicker</div>
        <div class="game-card" onclick="alert('Brzy přibude: Snake')">🐍 Snake</div>
        <div class="game-card" onclick="alert('Brzy přibude: Tetris')">🧱 Tetris</div>
        <div class="game-card" onclick="alert('Brzy přibude: Flappy')">🐦 Flappy</div>
        <div class="game-card" onclick="alert('Brzy přibude: Race')">🏎️ Race</div>
    </div>
</div>

<div id="game-overlay">
    <div class="controls">
        <span id="game-title">Hra</span>
        <span id="game-score">Skóre: 0</span>
        <button class="btn" onclick="backToMenu()">Zpět</button>
    </div>
    <canvas id="gameCanvas"></canvas>
    <div style="text-align: center; color: #666; font-size: 0.8rem; margin-top: 10px;">
        (Na mobilu ovládej tažením prstu)
    </div>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const overlay = document.getElementById("game-overlay");
    const scoreEl = document.getElementById("game-score");
    
    let currentGame = null;
    let score = 0;
    let gameActive = false;

    // Přizpůsobení velikosti canvasu
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerWidth * 0.6; // Poměr stran 16:10
    }

    function startGame(gameName) {
        overlay.style.display = "flex";
        resizeCanvas();
        score = 0;
        gameActive = true;
        currentGame = gameName;
        initGame();
        gameLoop();
    }

    function backToMenu() {
        overlay.style.display = "none";
        gameActive = false;
    }

    // --- LOGIKA HER ---
    let obj = { x: 0, y: 0, sx: 5, sy: 5, pY: 0 }; // Společný objekt pro stav hry

    function initGame() {
        obj.x = canvas.width / 2;
        obj.y = canvas.height / 2;
        obj.pY = canvas.height / 2 - 50;
        
        // Touch / Mouse ovládání
        const handleInput = (e) => {
            let clientY = e.touches ? e.touches[0].clientY : e.clientY;
            let rect = canvas.getBoundingClientRect();
            obj.pY = (clientY - rect.top) * (canvas.height / rect.height) - 50;
        };
        canvas.onmousemove = handleInput;
        canvas.ontouchmove = handleInput;
    }

    function update() {
        if (currentGame === 'pong') {
            obj.x += obj.sx; obj.y += obj.sy;
            if (obj.y < 0 || obj.y > canvas.height) obj.sy *= -1;
            if (obj.x > canvas.width) obj.sx *= -1;
            if (obj.x < 20) {
                if (obj.y > obj.pY && obj.y < obj.pY + 100) {
                    obj.sx = Math.abs(obj.sx) * 1.05;
                    obj.sx *= -1;
                    obj.sx = -obj.sx;
                    score++;
                } else {
                    score = 0; obj.x = canvas.width/2; obj.sx = 5;
                }
            }
        }
        scoreEl.innerText = "Skóre: " + score;
    }

    function draw() {
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = "#00ff88";
        if (currentGame === 'pong') {
            ctx.fillRect(10, obj.pY, 15, 100); // Pálka
            ctx.beginPath();
            ctx.arc(obj.x, obj.y, 10, 0, Math.PI*2);
            ctx.fill();
        } else if (currentGame === 'clicker') {
            ctx.beginPath();
            ctx.arc(canvas.width/2, canvas.height/2, 50, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "black";
            ctx.fillText("KLIKEJ", canvas.width/2 - 20, canvas.height/2 + 5);
            canvas.onclick = () => { if(currentGame==='clicker') score++; };
        }
    }

    function gameLoop() {
        if (!gameActive) return;
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    window.onresize = resizeCanvas;
</script>

</body>
</html>
