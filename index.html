<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Arcade 2026</title>
    <style>
        :root { --neon-blue: #00d2ff; --neon-green: #39ff14; --neon-pink: #ff007f; --neon-purple: #bc13fe; }
        body { margin: 0; background: #0a0a0c; font-family: 'Segoe UI', Roboto, sans-serif; color: white; overflow: hidden; }
        
        /* Menu Styl */
        #menu { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #1a1a2e 0%, #0a0a0c 100%); }
        h1 { font-size: 3rem; text-shadow: 0 0 20px var(--neon-blue); margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; width: 90%; max-width: 900px; }
        .card { background: #16161a; border: 2px solid #222; border-radius: 15px; padding: 30px 10px; cursor: pointer; transition: 0.3s; text-align: center; }
        .card:hover { border-color: var(--neon-blue); box-shadow: 0 0 15px var(--neon-blue); transform: translateY(-5px); }
        .card i { font-size: 2rem; display: block; margin-bottom: 10px; }

        /* Herní UI */
        #game-overlay { display: none; position: fixed; inset: 0; background: #000; flex-direction: column; }
        .header { padding: 15px; background: #111; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; }
        canvas { background: #000; display: block; margin: auto; max-width: 100%; max-height: 70vh; box-shadow: 0 0 50px rgba(0,0,0,1); }
        
        /* Ovládání pro mobil */
        #mobile-controls { display: none; padding: 10px; justify-content: center; gap: 10px; }
        .m-btn { background: #333; border: 1px solid #555; color: white; padding: 15px; border-radius: 10px; width: 60px; text-align: center; user-select: none; }
        
        #game-over-screen { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.9); flex-direction: column; align-items: center; justify-content: center; z-index: 200; }
        
        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr 1fr; }
            h1 { font-size: 2rem; }
            #mobile-controls { display: flex; }
        }
    </style>
</head>
<body>

<div id="menu">
    <h1>ARCADE HALL</h1>
    <div class="grid">
        <div class="card" onclick="start('tetris')" style="border-color: var(--neon-purple)">🔲 Tetris</div>
        <div class="card" onclick="start('pong')" style="border-color: var(--neon-blue)">🏓 Ping Pong</div>
        <div class="card" onclick="start('snake')" style="border-color: var(--neon-green)">🐍 Had</div>
        <div class="card" onclick="start('flappy')" style="border-color: #f1c40f">🐦 Flappy</div>
        <div class="card" onclick="start('dodger')" style="border-color: var(--neon-pink)">🛡️ Dodger</div>
        <div class="card" onclick="start('catcher')" style="border-color: #e67e22">🍎 Catcher</div>
    </div>
</div>

<div id="game-overlay">
    <div class="header">
        <span id="game-title">Hra</span>
        <b id="score-val" style="color: var(--neon-green); font-size: 1.5rem;">0</b>
        <button onclick="exitGame()" style="background: red; color: white; border: none; padding: 8px 15px; border-radius: 5px;">Konec</button>
    </div>
    
    <canvas id="c"></canvas>

    <div id="mobile-controls">
        <div class="m-btn" onpointerdown="move(-1)">←</div>
        <div class="m-btn" onpointerdown="rotate()">↻</div>
        <div class="m-btn" onpointerdown="move(1)">→</div>
        <div class="m-btn" onpointerdown="drop()">↓</div>
    </div>

    <div id="game-over-screen">
        <h2 style="color: red; font-size: 3rem;">KONEC HRY</h2>
        <p id="final-score" style="font-size: 1.5rem;">Skóre: 0</p>
        <button class="m-btn" style="width: auto; padding: 15px 40px;" onclick="restart()">Hrát znovu</button>
    </div>
</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
let mode = "", score = 0, active = false, frame = 0;
let grid = [], piece = null, nextPiece = null;

// Tetris barvy a tvary
const COLORS = [null, '#FF0D72', '#0DC2FF', '#0DFF72', '#F538FF', '#FF8E0D', '#FFE138', '#3877FF'];
const SHAPES = 'ILJOTSZ';

function createPiece(type) {
    if (type === 'I') return [[0,1,0,0],[0,1,0,0],[0,1,0,0],[0,1,0,0]];
    if (type === 'L') return [[0,2,0],[0,2,0],[0,2,2]];
    if (type === 'J') return [[0,3,0],[0,3,0],[3,3,0]];
    if (type === 'O') return [[4,4],[4,4]];
    if (type === 'T') return [[0,5,0],[5,5,5],[0,0,0]];
    if (type === 'S') return [[0,6,6],[6,6,0],[0,0,0]];
    if (type === 'Z') return [[7,7,0],[0,7,7],[0,0,0]];
}

function start(m) {
    mode = m; score = 0; active = true;
    document.getElementById("menu").style.display = "none";
    document.getElementById("game-overlay").style.display = "flex";
    document.getElementById("game-over-screen").style.display = "none";
    document.getElementById("game-title").innerText = m.toUpperCase();
    
    canvas.width = 300; canvas.height = 500;
    if(mode === 'tetris') initTetris();
    else initArcade();
    
    loop();
}

// --- TETRIS LOGIKA ---
function initTetris() {
    grid = Array.from({length: 20}, () => Array(12).fill(0));
    resetPiece();
}

function resetPiece() {
    piece = { pos: {x: 4, y: 0}, matrix: createPiece(SHAPES[SHAPES.length * Math.random() | 0]) };
    if (collide()) gameOver();
}

function collide() {
    const [m, o] = [piece.matrix, piece.pos];
    for (let y = 0; y < m.length; ++y) {
        for (let x = 0; x < m[y].length; ++x) {
            if (m[y][x] !== 0 && (grid[y + o.y] && grid[y + o.y][x + o.x]) !== 0) return true;
        }
    }
    return false;
}

function merge() {
    piece.matrix.forEach((row, y) => {
        row.forEach((value, x) => {
            if (value !== 0) grid[y + piece.pos.y][x + piece.pos.x] = value;
        });
    });
}

function sweep() {
    outer: for (let y = grid.length - 1; y > 0; --y) {
        for (let x = 0; x < grid[y].length; ++x) { if (grid[y][x] === 0) continue outer; }
        const row = grid.splice(y, 1)[0].fill(0);
        grid.unshift(row);
        score += 10;
        ++y;
    }
}

// --- ARCADE LOGIKA (Pong, Snake...) ---
let obj = {}; 
function initArcade() {
    frame = 0;
    if(mode === 'pong') obj = {x: 150, y: 250, sx: 4, sy: 4, pX: 100};
    if(mode === 'snake') { obj.snake = [{x:10, y:10}]; obj.d = {x:1, y:0}; obj.f = {x:15, y:15}; }
    if(mode === 'flappy') obj = {y: 250, v: 0, pipes: []};
    if(mode === 'dodger' || mode === 'catcher') obj = {pX: 125, items: []};
}

function loop() {
    if (!active) return;
    ctx.fillStyle = "#000"; ctx.fillRect(0,0,canvas.width,canvas.height);
    
    if (mode === 'tetris') {
        if (frame++ % 30 === 0) drop();
        drawTetris();
    } else {
        frame++;
        drawArcade();
    }
    
    document.getElementById("score-val").innerText = score;
    requestAnimationFrame(loop);
}

function drawTetris() {
    grid.forEach((row, y) => row.forEach((v, x) => { if(v) { ctx.fillStyle = COLORS[v]; ctx.fillRect(x*25, y*25, 24, 24); } }));
    piece.matrix.forEach((row, y) => row.forEach((v, x) => { if(v) { ctx.fillStyle = COLORS[v]; ctx.fillRect((x+piece.pos.x)*25, (y+piece.pos.y)*25, 24, 24); } }));
}

function drawArcade() {
    ctx.fillStyle = "var(--neon-blue)";
    if(mode === 'pong') {
        obj.x += obj.sx; obj.y += obj.sy;
        if(obj.x<5 || obj.x>295) obj.sx *= -1;
        if(obj.y<5) obj.sy *= -1;
        if(obj.y>470 && obj.x > obj.pX && obj.x < obj.pX+80) { obj.sy = -Math.abs(obj.sy)*1.05; score++; }
        if(obj.y>500) gameOver();
        ctx.fillRect(obj.pX, 480, 80, 10);
        ctx.beginPath(); ctx.arc(obj.x, obj.y, 8, 0, 7); ctx.fill();
    }
    if(mode === 'snake') {
        if(frame % 10 === 0) {
            let h = {x: obj.snake[0].x + obj.d.x, y: obj.snake[0].y + obj.d.y};
            if(h.x<0||h.x>14||h.y<0||h.y>19) return gameOver();
            obj.snake.unshift(h);
            if(h.x===obj.f.x && h.y===obj.f.y) { score++; obj.f={x:Math.random()*15|0, y:Math.random()*20|0}; } else obj.snake.pop();
        }
        ctx.fillStyle='red'; ctx.fillRect(obj.f.x*20, obj.f.y*20, 18, 18);
        ctx.fillStyle='var(--neon-green)'; obj.snake.forEach(s=>ctx.fillRect(s.x*20, s.y*20, 18, 18));
    }
    // ... další arcade hry zjednodušeně pro délku kódu ...
}

// Ovládání
function move(dir) {
    if(mode==='tetris') { piece.pos.x += dir; if(collide()) piece.pos.x -= dir; }
    else if(mode==='pong' || mode==='dodger' || mode==='catcher') obj.pX += dir*20;
}
function rotate() {
    if(mode!=='tetris') return;
    const m = piece.matrix;
    piece.matrix = m[0].map((_, i) => m.map(row => row[i]).reverse());
    if(collide()) piece.matrix = m;
}
function drop() {
    if(mode==='tetris') {
        piece.pos.y++;
        if(collide()) { piece.pos.y--; merge(); sweep(); resetPiece(); }
    }
}

// Mobilní dotyk / Myš pro Pong
canvas.onpointermove = (e) => {
    let rect = canvas.getBoundingClientRect();
    let x = (e.clientX - rect.left) * (canvas.width / rect.width);
    if(mode === 'pong' || mode === 'dodger' || mode === 'catcher') obj.pX = x - 40;
};

function gameOver() {
    active = false;
    document.getElementById("game-over-screen").style.display = "flex";
    document.getElementById("final-score").innerText = "Konečné skóre: " + score;
}

function exitGame() { active = false; document.getElementById("menu").style.display = "flex"; document.getElementById("game-overlay").style.display = "none"; }
function restart() { start(mode); }

// Klávesnice pro PC
window.onkeydown = (e) => {
    if(e.key === 'ArrowLeft') move(-1);
    if(e.key === 'ArrowRight') move(1);
    if(e.key === 'ArrowUp') rotate();
    if(e.key === 'ArrowDown') drop();
};
</script>
</body>
</html>
