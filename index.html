<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>6 v 1 Mini Hry</title>
    <style>
        :root { --main-color: #00ff88; --bg: #121212; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: white; overflow: hidden; touch-action: none; }
        
        /* Menu */
        #menu { padding: 20px; text-align: center; height: 100vh; overflow-y: auto; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; max-width: 800px; margin: 20px auto; }
        .card { background: #222; padding: 25px 10px; border-radius: 12px; cursor: pointer; border: 2px solid #333; transition: 0.2s; font-size: 1.1rem; }
        .card:hover { border-color: var(--main-color); transform: scale(1.05); }

        /* Herní obrazovka */
        #game-stage { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; flex-direction: column; }
        canvas { background: #050505; display: block; width: 100%; height: auto; max-height: 70vh; touch-action: none; }
        .ui { padding: 15px; display: flex; justify-content: space-between; align-items: center; background: #1a1a1a; }
        .btn { background: var(--main-color); color: #000; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="menu">
    <h1>🎮 Herní Portál</h1>
    <div class="grid">
        <div class="card" onclick="start('pong')">🏓 Pong</div>
        <div class="card" onclick="start('clicker')">🖱️ Clicker</div>
        <div class="card" onclick="start('snake')">🐍 Had</div>
        <div class="card" onclick="start('flappy')">🐦 Flappy</div>
        <div class="card" onclick="start('dodger')">🛡️ Dodger</div>
        <div class="card" onclick="start('catcher')">🍎 Catcher</div>
    </div>
</div>

<div id="game-stage">
    <div class="ui">
        <span id="title">Hra</span>
        <b id="score-display">Skóre: 0</b>
        <button class="btn" onclick="stop()">Zavřít</button>
    </div>
    <canvas id="canvas"></canvas>
    <p style="text-align:center; color:#555; font-size:0.8rem">Ovládej dotykem nebo myší</p>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const scoreEl = document.getElementById("score-display");
let gameMode = "", score = 0, active = false, frame = 0;
let pY = 0, pX = 0, ball = {}, items = [], snake = [], dir = {x:0, y:0};

function start(mode) {
    document.getElementById("menu").style.display = "none";
    document.getElementById("game-stage").style.display = "flex";
    document.getElementById("title").innerText = mode.toUpperCase();
    canvas.width = 400; canvas.height = 500;
    gameMode = mode; score = 0; active = true; frame = 0;
    init(); loop();
}

function stop() {
    active = false;
    document.getElementById("menu").style.display = "block";
    document.getElementById("game-stage").style.display = "none";
}

// Inicializace herních prvků
function init() {
    pX = canvas.width/2; pY = canvas.height - 30;
    items = [];
    if(gameMode === 'pong') ball = {x:200, y:250, sx:4, sy:4};
    if(gameMode === 'snake') {
        snake = [{x:10, y:10}]; dir = {x:1, y:0};
        ball = {x:15, y:15}; // Jídlo pro hada
    }
    if(gameMode === 'flappy') ball = {x:50, y:250, sy:0};
    if(gameMode === 'dodger' || gameMode === 'catcher') pX = 200;
}

// Ovládání
const input = (e) => {
    let rect = canvas.getBoundingClientRect();
    let pos = e.touches ? e.touches[0] : e;
    let relX = (pos.clientX - rect.left) * (canvas.width / rect.width);
    let relY = (pos.clientY - rect.top) * (canvas.height / rect.height);
    
    pX = relX; pY = relY;
    if(gameMode === 'flappy' && (e.type === 'mousedown' || e.type === 'touchstart')) ball.sy = -6;
    if(gameMode === 'snake') {
        if(Math.abs(relX - 200) > Math.abs(relY - 250)) dir = {x: relX > 200 ? 1 : -1, y: 0};
        else dir = {x: 0, y: relY > 250 ? 1 : -1};
    }
};
canvas.addEventListener('mousemove', input);
canvas.addEventListener('mousedown', input);
canvas.addEventListener('touchstart', input);
canvas.addEventListener('touchmove', input);

function loop() {
    if(!active) return;
    ctx.fillStyle = "black"; ctx.fillRect(0,0,400,500);
    ctx.fillStyle = "#00ff88";
    frame++;

    if(gameMode === 'pong') {
        ball.x += ball.sx; ball.y += ball.sy;
        if(ball.x<0 || ball.x>400) ball.sx *= -1;
        if(ball.y<0) ball.sy *= -1;
        if(ball.y>470 && ball.x > pX-50 && ball.x < pX+50) { ball.sy = -Math.abs(ball.sy); score++; }
        if(ball.y>500) { score=0; init(); }
        ctx.fillRect(pX-50, 480, 100, 10);
        ctx.beginPath(); ctx.arc(ball.x, ball.y, 8, 0, 7); ctx.fill();
    }

    if(gameMode === 'clicker') {
        if(frame === 1) ball = {x:200, y:250, r:50};
        ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, 7); ctx.fill();
        canvas.onmousedown = () => { 
            if(active && gameMode==='clicker') {
                score++; ball.x = 50 + Math.random()*300; ball.y = 50 + Math.random()*400;
            }
        };
    }

    if(gameMode === 'snake') {
        if(frame % 10 === 0) {
            let head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
            snake.unshift(head);
            if(head.x === ball.x && head.y === ball.y) { score++; ball = {x:Math.floor(Math.random()*20), y:Math.floor(Math.random()*25)}; }
            else snake.pop();
            if(head.x<0 || head.x>19 || head.y<0 || head.y>24) { score=0; init(); }
        }
        ctx.fillStyle = "red"; ctx.fillRect(ball.x*20, ball.y*20, 18, 18);
        ctx.fillStyle = "#00ff88";
        snake.forEach(s => ctx.fillRect(s.x*20, s.y*20, 18, 18));
    }

    if(gameMode === 'flappy') {
        ball.sy += 0.25; ball.y += ball.sy;
        if(frame % 100 === 0) items.push({x:400, y:Math.random()*300});
        items.forEach((it, i) => {
            it.x -= 3; ctx.fillRect(it.x, 0, 30, it.y); ctx.fillRect(it.x, it.y+150, 30, 500);
            if(it.x === 50) score++;
            if(it.x < 80 && it.x > 20 && (ball.y < it.y || ball.y > it.y+150)) { score=0; init(); }
        });
        if(ball.y>500 || ball.y<0) { score=0; init(); }
        ctx.beginPath(); ctx.arc(50, ball.y, 10, 0, 7); ctx.fill();
    }

    if(gameMode === 'dodger' || gameMode === 'catcher') {
        if(frame % 20 === 0) items.push({x: Math.random()*380, y: 0, s: 3+Math.random()*3});
        ctx.fillRect(pX-25, 470, 50, 10);
        items.forEach((it, i) => {
            it.y += it.s; ctx.fillStyle = gameMode === 'dodger' ? "red" : "orange";
            ctx.fillRect(it.x, it.y, 20, 20);
            if(it.y > 460 && it.x > pX-35 && it.x < pX+25) {
                if(gameMode === 'dodger') { score=0; init(); } else { score++; items.splice(i,1); }
            } else if (it.y > 500) { if(gameMode === 'dodger') score++; items.splice(i,1); }
        });
    }

    scoreEl.innerText = "Skóre: " + score;
    requestAnimationFrame(loop);
}
</script>
</body>
</html>
